<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zack's Pokemon Collection</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--bg:#0f0f1a;--surface:#1a1a2e;--gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:#7a6030;--text:#e8e0d0;--text-dim:#8a8070;--red:#e05555;--green:#4caf50;--blue:#4fa3d6;--border:rgba(201,168,76,0.25);--radius:12px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:120px;}
  header{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;}
  .logo{font-size:1.35rem;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .lsub{font-size:0.74rem;color:var(--text-dim);margin-top:1px;}
  .lw{margin-left:auto;display:flex;align-items:center;gap:5px;}
  .ldot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
  .llbl{font-size:0.72rem;color:var(--green);font-weight:700;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  main{max-width:1200px;margin:0 auto;padding:16px 13px;}
  .fbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .fbtn{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:0.72rem;font-weight:600;cursor:pointer;text-transform:uppercase;}
  .fbtn.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);}
  #card-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .ci{background:#1a1a2e;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all 0.2s;position:relative;}
  .ci.sel{border-color:var(--gold);box-shadow:0 0 22px rgba(201,168,76,0.3);}
  .ci.sold{opacity:0.45;}
  .ci.sold::after{content:'SOLD';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);font-size:2rem;font-weight:900;color:var(--red);letter-spacing:4px;border:3px solid var(--red);padding:4px 12px;border-radius:4px;pointer-events:none;z-index:6;}
  .schk{position:absolute;top:9px;right:9px;min-width:26px;height:26px;padding:0 7px;background:var(--gold);border-radius:13px;display:flex;align-items:center;justify-content:center;color:#1a1408;font-weight:900;font-size:0.8rem;z-index:5;}
  .cimg{position:relative;aspect-ratio:4/3;overflow:hidden;background:#0a0a15;cursor:pointer;}
  .cimg img{width:100%;height:100%;object-fit:contain;display:none;}
  .cimg img.active{display:block;}
  .cnav{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;}
  .cdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;}
  .cdot.active{background:var(--gold);width:13px;border-radius:3px;}
  .cbtn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.6);border:none;color:white;width:23px;height:23px;border-radius:50%;cursor:pointer;font-size:0.78rem;display:flex;align-items:center;justify-content:center;z-index:2;}
  .cbtn.prev{left:6px;}.cbtn.next{right:6px;}
  .bbadge{position:absolute;top:7px;left:7px;background:#5a2d80;color:white;font-size:0.62rem;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;z-index:3;}
  .ebadge{position:absolute;top:7px;left:7px;background:var(--gold);color:#1a1408;font-size:0.6rem;font-weight:900;padding:2px 6px;border-radius:4px;text-transform:uppercase;z-index:3;}
  .cbody{padding:10px;}
  .cname{font-size:0.9rem;font-weight:700;margin-bottom:2px;}
  .cnum{font-size:0.67rem;color:var(--text-dim);margin-bottom:4px;}
  .cset{font-size:0.72rem;color:var(--gold);font-weight:600;margin-bottom:5px;}
  .ctags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
  .tag{font-size:0.61rem;padding:2px 5px;border-radius:4px;font-weight:600;text-transform:uppercase;}
  .tr{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--gold-dim);}
  .th{background:rgba(79,163,214,0.12);color:var(--blue);border:1px solid rgba(79,163,214,0.3);}
  .cremark{font-size:0.7rem;color:var(--text-dim);line-height:1.4;margin-bottom:8px;}
  .pdisplay{font-size:1.15rem;font-weight:800;color:var(--gold-light);}
  .punset{font-size:0.8rem;color:var(--text-dim);font-style:italic;}
  .stock{font-size:0.66rem;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:0.3px;}
  .stock.low{color:var(--red);}
  .stock.ok{color:var(--text-dim);}
  .qrow{display:flex;align-items:center;gap:10px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
  .qlbl{font-size:0.7rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;flex:1;}
  .qstep{display:flex;align-items:center;border:1px solid var(--gold-dim);border-radius:7px;overflow:hidden;}
  .qbtn{width:28px;height:28px;background:var(--surface);border:none;color:var(--gold);font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .qbtn:disabled{color:var(--text-dim);opacity:0.4;cursor:default;}
  .qval{min-width:30px;text-align:center;font-weight:800;font-size:0.95rem;color:var(--text);}
  .addbtn{width:100%;margin-top:8px;padding:8px;border-radius:7px;border:1px solid var(--gold-dim);background:rgba(201,168,76,0.1);color:var(--gold);font-size:0.78rem;font-weight:700;cursor:pointer;}
  .addbtn:hover{background:rgba(201,168,76,0.2);}
  .addbtn.added{background:var(--gold);color:#1a1408;}
  #cart{position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;border-top:2px solid var(--gold);z-index:150;transition:transform 0.3s ease;}
  #cart.col{transform:translateY(calc(100% - 56px));}
  .ctog{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;}
  .ccnt{background:var(--gold);color:#1a1408;min-width:24px;height:24px;padding:0 6px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:800;}
  .ctitle{font-weight:700;flex:1;font-size:0.9rem;}
  .ctotal{font-weight:800;color:var(--gold-light);font-size:1.05rem;}
  .cbdy{padding:0 16px 13px;max-height:48vh;overflow-y:auto;}
  .cempty{color:var(--text-dim);font-size:0.8rem;padding:12px 0;text-align:center;}
  .crow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
  .crow img{width:44px;height:44px;object-fit:cover;border-radius:5px;}
  .cri{flex:1;}
  .crn{font-size:0.84rem;font-weight:600;}
  .crs{font-size:0.7rem;color:var(--text-dim);}
  .crp{font-weight:700;color:var(--gold-light);text-align:right;}
  .crq{font-size:0.68rem;color:var(--text-dim);}
  .crm{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;}
  .csum{padding:11px 0 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .gt{font-size:1.45rem;font-weight:800;color:var(--gold-light);}
  .gtl{font-size:0.78rem;color:var(--text-dim);}
  .btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:0.8rem;font-weight:600;}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#1a1408;}
  .btn-outline{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);}
  .cartbtns{display:flex;gap:7px;flex-wrap:wrap;width:100%;margin-top:4px;}
  .cartbtns .btn{flex:1;text-align:center;}
  #toast{position:fixed;bottom:72px;right:14px;background:#1a1a2e;border:1px solid var(--gold);border-radius:8px;padding:9px 14px;font-size:0.78rem;font-weight:600;color:var(--gold-light);z-index:300;transform:translateY(12px);opacity:0;transition:all 0.25s;pointer-events:none;max-width:250px;}
  #toast.show{transform:translateY(0);opacity:1;}
  /* Checkout overlay */
  #checkout{position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;display:none;}
  .co-head{background:linear-gradient(135deg,#0f0f1a,#1a1a2e);border-bottom:1px solid var(--border);padding:16px 18px;position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:10px;}
  .co-back{background:none;border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:0.8rem;font-weight:600;}
  .co-title{font-size:1.1rem;font-weight:800;color:var(--gold-light);flex:1;}
  .co-body{max-width:760px;margin:0 auto;padding:18px 14px;}
  .co-meta{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;}
  .co-ref{font-size:0.78rem;color:var(--text-dim);}
  .co-ref strong{color:var(--gold-light);font-size:1rem;}
  .co-date{font-size:0.72rem;color:var(--text-dim);margin-top:3px;}
  .co-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:9px;}
  .co-row img{width:62px;height:62px;object-fit:cover;border-radius:7px;flex-shrink:0;border:1px solid var(--border);}
  .co-info{flex:1;min-width:0;}
  .co-cn{font-size:0.92rem;font-weight:700;}
  .co-cs{font-size:0.72rem;color:var(--gold);}
  .co-cd{font-size:0.68rem;color:var(--text-dim);}
  .co-qty{font-size:0.78rem;color:var(--text-dim);margin-top:2px;}
  .co-lp{text-align:right;font-weight:800;color:var(--gold-light);font-size:0.95rem;white-space:nowrap;}
  .co-totbox{background:var(--surface);border:2px solid var(--gold);border-radius:var(--radius);padding:16px;margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .co-totl{font-size:0.82rem;color:var(--text-dim);}
  .co-tot{font-size:1.7rem;font-weight:900;color:var(--gold-light);}
  .co-actions{display:flex;gap:9px;margin-top:18px;flex-wrap:wrap;}
  .co-actions .btn{flex:1;min-width:130px;padding:13px;font-size:0.88rem;text-align:center;}
  .co-note{font-size:0.72rem;color:var(--text-dim);text-align:center;margin-top:14px;line-height:1.5;}
  @media(max-width:600px){#card-list{grid-template-columns:1fr 1fr;gap:9px;}.cbody{padding:8px;}.cname{font-size:0.8rem;}}
</style>
</head>
<body>
<header>
  <div><div class="logo">PokeVault</div><div class="lsub">Zack's Vintage Collection - Singapore</div></div>
  <div class="lw"><div class="ldot"></div><div class="llbl">LIVE</div></div>
</header>
<main>
  <div class="fbar">
    <span style="font-size:0.72rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;">Filter:</span>
    <button class="fbtn active" onclick="setF('all',this)">All</button>
    <button class="fbtn" onclick="setF('Base Set',this)">Base Set</button>
    <button class="fbtn" onclick="setF('Neo',this)">Neo</button>
    <button class="fbtn" onclick="setF('Team Rocket',this)">Rocket</button>
    <button class="fbtn" onclick="setF('EX',this)">EX Era</button>
    <button class="fbtn" onclick="setF('bundle',this)">Bundles</button>
    <button class="fbtn" style="border-color:var(--gold);color:var(--gold);margin-left:auto;" onclick="selectAll()">+ Select All</button>
  </div>
  <div id="card-list"></div>
</main>
<div id="cart" class="col">
  <div class="ctog" onclick="toggleCart()">
    <div class="ccnt" id="ccnt">0</div>
    <div class="ctitle">My Cart</div>
    <div class="ctotal" id="ctotal">SGD 0.00</div>
    <span id="cchev">&#9650;</span>
  </div>
  <div class="cbdy" id="cbdy"><div class="cempty">Tap any card to add it.</div></div>
</div>

<div id="checkout">
  <div class="co-head">
    <button class="co-back" onclick="closeCheckout()">&#8592; Back</button>
    <div class="co-title">Order Summary</div>
  </div>
  <div class="co-body" id="co-body"></div>
</div>

<div id="lightbox" onclick="closeLightbox()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:600;align-items:center;justify-content:center;padding:20px;">
  <button onclick="event.stopPropagation();closeLightbox()" style="position:absolute;top:16px;right:16px;width:40px;height:40px;background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:50%;font-size:1.4rem;cursor:pointer;z-index:2;">&#215;</button>
  <button id="lb-prev" onclick="event.stopPropagation();lbStep(-1)" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:50%;font-size:1.5rem;cursor:pointer;">&#8249;</button>
  <img id="lb-img" src="" style="max-width:100%;max-height:88vh;object-fit:contain;border-radius:8px;" onclick="event.stopPropagation()">
  <button id="lb-next" onclick="event.stopPropagation();lbStep(1)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(255,255,255,0.12);border:none;color:#fff;border-radius:50%;font-size:1.5rem;cursor:pointer;">&#8250;</button>
  <div id="lb-count" style="position:absolute;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;font-size:0.8rem;background:rgba(0,0,0,0.5);padding:4px 12px;border-radius:12px;"></div>
</div>
<div id="toast"></div>

var CART_KEY='pv_buyer_cart';
var cart={}, cartOpen=false, curF='all', picQty={};

function loadCart(){try{var s=localStorage.getItem(CART_KEY);if(s)cart=JSON.parse(s)||{};}catch(e){cart={};}}
function persistCart(){try{localStorage.setItem(CART_KEY,JSON.stringify(cart));}catch(e){}}
function getQty(c){return (c.qty===undefined||c.qty===null)?1:parseInt(c.qty);}

function render(){var L=document.getElementById('card-list');L.innerHTML='';CARDS.filter(function(c){if(curF==='all')return true;if(curF==='bundle')return c.type==='bundle';return c.set&&c.set.toLowerCase().indexOf(curF.toLowerCase())>=0;}).forEach(function(c){L.appendChild(mkCard(c));});}
function mkCard(c){
  var d=document.createElement('div');
  var inCart=cart[c.id]>0;
  var avail=getQty(c);
  var soldOut=c.sold||avail<=0;
  d.className='ci'+(soldOut?' sold':'')+(inCart?' sel':'');
  var is1=c.remarks&&c.remarks.toLowerCase().indexOf('1st edition')>=0;
  var imgs=c.images||[];var car='';
  if(imgs.length>0){
    var it=imgs.map(function(s,i){return "<img src='"+s+"' class='"+(i===0?'active':'')+"' loading='lazy'>";}).join('');
    var dots=imgs.length>1?"<div class='cnav'>"+imgs.map(function(_,i){return "<div class='cdot "+(i===0?'active':'')+"' onclick='event.stopPropagation();cGo(\""+c.id+"\","+i+")'></div>";}).join('')+"</div>":'';
    var pv=imgs.length>1?"<button class='cbtn prev' onclick='event.stopPropagation();cSt(\""+c.id+"\",-1)'>&#8249;</button>":'';
    var nx=imgs.length>1?"<button class='cbtn next' onclick='event.stopPropagation();cSt(\""+c.id+"\",1)'>&#8250;</button>":'';
    car="<div class='cimg' id='ci-"+c.id+"' onclick='openLightbox(\""+c.id+"\")'>"+pv+it+nx+dots+"</div>";
  }else car="<div class='cimg' style='display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:0.75rem;'>No image</div>";
  var badge=c.type==='bundle'?"<div class='bbadge'>Bundle</div>":(is1?"<div class='ebadge'>1st Ed</div>":'');
  var chk=inCart?"<div class='schk'>"+cart[c.id]+" in cart</div>":'';
  var ph=c.price?"<div class='pdisplay'>SGD "+parseFloat(c.price).toFixed(2)+"</div>":"<div class='punset'>Price on request</div>";
  var stock='';
  if(!soldOut&&c.price){
    if(avail===1)stock="<div class='stock low'>Only 1 left!</div>";
    else stock="<div class='stock ok'>"+avail+" available</div>";
  }
  var controls='';
  if(!soldOut&&c.price){
    var sel=picQty[c.id]||1;if(sel>avail)sel=avail;
    var minus="<button class='qbtn' onclick='event.stopPropagation();chgQty(\""+c.id+"\",-1,"+avail+")' "+(sel<=1?'disabled':'')+">&#8722;</button>";
    var plus="<button class='qbtn' onclick='event.stopPropagation();chgQty(\""+c.id+"\",1,"+avail+")' "+(sel>=avail?'disabled':'')+">+</button>";
    controls="<div class='qrow'><span class='qlbl'>Qty</span><div class='qstep'>"+minus+"<span class='qval' id='qv-"+c.id+"'>"+sel+"</span>"+plus+"</div></div>";
    controls+="<button class='addbtn"+(inCart?' added':'')+"' onclick='event.stopPropagation();addToCart(\""+c.id+"\","+avail+")'>"+(inCart?'Update Cart ('+cart[c.id]+')':'Add to Cart')+"</button>";
  }
  d.innerHTML=car+badge+chk+"<div class='cbody'><div class='cname'>"+c.name+"</div><div class='cnum'>"+(c.number||'')+"</div><div class='cset'>"+(c.set||'')+"</div><div class='ctags'>"+(c.rarity?"<span class='tag tr'>"+c.rarity+"</span>":'')+(c.holo&&c.holo!=='None'?"<span class='tag th'>"+c.holo+"</span>":'')+"</div><div class='cremark'>"+(c.remarks||'')+"</div><div>"+ph+"</div>"+stock+controls+"</div>";
  return d;
}
function chgQty(id,delta,avail){var cur=picQty[id]||1;cur+=delta;if(cur<1)cur=1;if(cur>avail)cur=avail;picQty[id]=cur;var el=document.getElementById('qv-'+id);if(el)el.textContent=cur;render();}
function addToCart(id,avail){var c=CARDS.find(function(c){return c.id===id;});if(!c||!c.price)return;var q=picQty[id]||1;if(q>avail)q=avail;cart[id]=q;persistCart();render();renderCart();showToast('Added '+q+' to cart');}
function cGo(id,idx){var e=document.getElementById('ci-'+id);if(!e)return;e.querySelectorAll('img').forEach(function(i,n){i.classList.toggle('active',n===idx);});e.querySelectorAll('.cdot').forEach(function(d,n){d.classList.toggle('active',n===idx);});}
function cSt(id,dir){var e=document.getElementById('ci-'+id);if(!e)return;var imgs=e.querySelectorAll('img');var c=0;imgs.forEach(function(i,n){if(i.classList.contains('active'))c=n;});cGo(id,(c+dir+imgs.length)%imgs.length);}
function removeFromCart(id){delete cart[id];delete picQty[id];persistCart();render();renderCart();}
function clearCart(){if(!confirm('Clear all items from cart?'))return;cart={};picQty={};persistCart();render();renderCart();showToast('Cart cleared');}

function renderCart(){
  var ids=Object.keys(cart);var n=0;ids.forEach(function(id){n+=cart[id];});
  document.getElementById('ccnt').textContent=n;
  var b=document.getElementById('cbdy');
  if(!ids.length){b.innerHTML="<div class='cempty'>Tap any card to add it.</div>";document.getElementById('ctotal').textContent='SGD 0.00';return;}
  var tot=0,html='';
  ids.forEach(function(id){
    var c=CARDS.find(function(c){return c.id===id;});if(!c)return;
    var q=cart[id];var p=parseFloat(c.price)||0;var line=p*q;tot+=line;
    var img=c.images&&c.images[0]?c.images[0]:'';
    html+="<div class='crow'>"+(img?"<img src='"+img+"'>":'')+"<div class='cri'><div class='crn'>"+c.name+"</div><div class='crs'>"+c.set+" - "+c.rarity+"</div><div class='crq'>"+q+" x SGD "+p.toFixed(2)+"</div></div><div class='crp'>SGD "+line.toFixed(2)+"</div><button class='crm' onclick='removeFromCart(\""+id+"\")'>&#215;</button></div>";
  });
  html+="<div class='csum'><div><div class='gtl'>Grand Total ("+n+" item"+(n!==1?'s':'')+")</div><div class='gt'>SGD "+tot.toFixed(2)+"</div></div></div>";
  html+="<div class='cartbtns'><button class='btn btn-outline' onclick='clearCart()'>Clear</button><button class='btn btn-gold' onclick='openCheckout()'>Checkout &#8594;</button></div>";
  b.innerHTML=html;document.getElementById('ctotal').textContent='SGD '+tot.toFixed(2);
}

function genRef(){
  var d=new Date();
  var p=function(n){return (n<10?'0':'')+n;};
  return 'PV'+d.getFullYear().toString().slice(2)+p(d.getMonth()+1)+p(d.getDate())+'-'+p(d.getHours())+p(d.getMinutes())+p(d.getSeconds());
}
var currentRef='';

function openCheckout(){
  var ids=Object.keys(cart);if(!ids.length){showToast('Cart is empty');return;}
  currentRef=genRef();
  var now=new Date();
  var dateStr=now.toLocaleDateString()+' '+now.toLocaleTimeString();
  var tot=0,n=0,rows='';
  ids.forEach(function(id){
    var c=CARDS.find(function(c){return c.id===id;});if(!c)return;
    var q=cart[id];var p=parseFloat(c.price)||0;var line=p*q;tot+=line;n+=q;
    var img=c.images&&c.images[0]?c.images[0]:'';
    rows+="<div class='co-row'>"+(img?"<img src='"+img+"'>":"<div style='width:62px;height:62px;border-radius:7px;background:#0a0a15;'></div>")
      +"<div class='co-info'><div class='co-cn'>"+c.name+"</div><div class='co-cs'>"+c.set+" "+(c.number||'')+"</div><div class='co-cd'>"+(c.rarity||'')+(c.holo&&c.holo!=='None'?' - '+c.holo:'')+"</div><div class='co-qty'>"+q+" x SGD "+p.toFixed(2)+"</div></div>"
      +"<div class='co-lp'>SGD "+line.toFixed(2)+"</div></div>";
  });
  var html="<div class='co-meta'><div class='co-ref'>Order Ref: <strong>"+currentRef+"</strong></div><div class='co-date'>"+dateStr+"</div></div>"
    +rows
    +"<div class='co-totbox'><div class='co-totl'>Grand Total ("+n+" item"+(n!==1?'s':'')+")</div><div class='co-tot'>SGD "+tot.toFixed(2)+"</div></div>"
    +"<div class='co-actions'><button class='btn btn-gold' onclick='downloadPDF()'>&#11015; Download PDF</button></div>"
    +"<div class='co-note'>Download the PDF and send it to Zack to confirm your order.<br>Your cart is saved on this device - you can come back anytime.</div>";
  document.getElementById('co-body').innerHTML=html;
  document.getElementById('checkout').style.display='block';
  window.scrollTo(0,0);
}
function closeCheckout(){document.getElementById('checkout').style.display='none';}

function downloadPDF(){
  var ids=Object.keys(cart);if(!ids.length)return;
  try{
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF({unit:'mm',format:'a4'});
    var W=210,M=14,y=18;
    doc.setFillColor(15,15,26);doc.rect(0,0,W,28,'F');
    doc.setTextColor(201,168,76);doc.setFontSize(20);doc.setFont(undefined,'bold');
    doc.text('PokeVault Order',M,16);
    doc.setFontSize(9);doc.setTextColor(180,170,150);doc.setFont(undefined,'normal');
    doc.text("Zack's Vintage Pokemon Collection - Singapore",M,23);
    y=38;
    doc.setTextColor(40,40,40);doc.setFontSize(10);
    doc.text('Order Ref: '+currentRef,M,y);
    var now=new Date();
    doc.text('Date: '+now.toLocaleDateString()+' '+now.toLocaleTimeString(),W-M,y,{align:'right'});
    y+=6;
    doc.setDrawColor(201,168,76);doc.setLineWidth(0.4);doc.line(M,y,W-M,y);y+=4;
    // table header
    doc.setFontSize(8);doc.setFont(undefined,'bold');doc.setTextColor(110,110,110);
    doc.text('IMG',M,y+4);
    doc.text('CARD',M+22,y+4);
    doc.text('QTY',W-M-46,y+4,{align:'right'});
    doc.text('UNIT',W-M-26,y+4,{align:'right'});
    doc.text('TOTAL',W-M,y+4,{align:'right'});
    y+=7;doc.setDrawColor(220,220,220);doc.line(M,y,W-M,y);y+=2;
    doc.setFont(undefined,'normal');
    var tot=0,n=0;
    ids.forEach(function(id){
      var c=CARDS.find(function(c){return c.id===id;});if(!c)return;
      var q=cart[id];var p=parseFloat(c.price)||0;var line=p*q;tot+=line;n+=q;
      if(y>262){doc.addPage();y=20;}
      var rowH=18;
      var img=c.images&&c.images[0]?c.images[0]:'';
      if(img){try{doc.addImage(img,'JPEG',M,y,16,16);}catch(e){}}
      doc.setTextColor(30,30,30);doc.setFontSize(9);doc.setFont(undefined,'bold');
      doc.text(c.name.substring(0,32),M+22,y+5);
      doc.setFont(undefined,'normal');doc.setFontSize(7.5);doc.setTextColor(120,120,120);
      doc.text((c.set+' '+(c.number||'')).substring(0,38),M+22,y+10);
      doc.text(((c.rarity||'')+(c.holo&&c.holo!=='None'?' - '+c.holo:'')).substring(0,38),M+22,y+14);
      doc.setTextColor(30,30,30);doc.setFontSize(9);
      doc.text(''+q,W-M-46,y+8,{align:'right'});
      doc.text(p.toFixed(2),W-M-26,y+8,{align:'right'});
      doc.setFont(undefined,'bold');
      doc.text(line.toFixed(2),W-M,y+8,{align:'right'});
      doc.setFont(undefined,'normal');
      y+=rowH;
      doc.setDrawColor(235,235,235);doc.line(M,y,W-M,y);y+=2;
    });
    y+=4;
    if(y>250){doc.addPage();y=20;}
    doc.setFillColor(201,168,76);doc.rect(M,y,W-2*M,14,'F');
    doc.setTextColor(26,20,8);doc.setFontSize(11);doc.setFont(undefined,'bold');
    doc.text('GRAND TOTAL ('+n+' items)',M+4,y+9);
    doc.setFontSize(13);
    doc.text('SGD '+tot.toFixed(2),W-M-4,y+9,{align:'right'});
    y+=22;
    doc.setTextColor(120,120,120);doc.setFontSize(8);doc.setFont(undefined,'normal');
    doc.text('Send this PDF to Zack to confirm your order. Prices in SGD.',M,y);
    doc.save('PokeVault_'+currentRef+'.pdf');
    showToast('PDF downloaded!');
  }catch(e){showToast('PDF error: '+e.message);}
}

function toggleCart(){cartOpen=!cartOpen;document.getElementById('cart').classList.toggle('col',!cartOpen);document.getElementById('cchev').textContent=cartOpen?'\u25BC':'\u25B2';}
function setF(f,btn){curF=f;document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');render();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}

var lbImgs=[],lbIdx=0;
function openLightbox(id){
  var c=CARDS.find(function(c){return c.id===id;});
  if(!c||!c.images||!c.images.length)return;
  lbImgs=c.images;lbIdx=0;
  // start from currently shown image
  var e=document.getElementById('ci-'+id);
  if(e){var imgs=e.querySelectorAll('img');imgs.forEach(function(im,n){if(im.classList.contains('active'))lbIdx=n;});}
  showLb();
  document.getElementById('lightbox').style.display='flex';
}
function showLb(){
  document.getElementById('lb-img').src=lbImgs[lbIdx];
  var multi=lbImgs.length>1;
  document.getElementById('lb-prev').style.display=multi?'block':'none';
  document.getElementById('lb-next').style.display=multi?'block':'none';
  document.getElementById('lb-count').style.display=multi?'block':'none';
  if(multi)document.getElementById('lb-count').textContent=(lbIdx+1)+' / '+lbImgs.length;
}
function lbStep(d){lbIdx=(lbIdx+d+lbImgs.length)%lbImgs.length;showLb();}
function closeLightbox(){document.getElementById('lightbox').style.display='none';}

function selectAll(){
  var added=0;
  CARDS.forEach(function(c){
    var avail=getQty(c);
    if(c.sold||avail<=0||!c.price)return;
    cart[c.id]=avail;
    added++;
  });
  persistCart();render();renderCart();
  if(!cartOpen)toggleCart();
  showToast(added?'Selected all '+added+' cards':'Nothing available to select');
}

loadCart();
render();
renderCart();
</script>
</body>
</html>
