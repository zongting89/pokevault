<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zack's Pokémon Collection</title>
<style>
  :root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:#7a6030;--text:#e8e0d0;--text-dim:#8a8070;--red:#e05555;--green:#4caf50;--blue:#4fa3d6;--border:rgba(201,168,76,0.25);--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.5);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding-bottom:120px;}
  header{background:linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 50%,#0f1a2e 100%);border-bottom:1px solid var(--border);padding:14px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .logo{font-size:1.35rem;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .lsub{font-size:0.74rem;color:var(--text-dim);margin-top:1px;}
  .lw{margin-left:auto;display:flex;align-items:center;gap:5px;}
  .ldot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
  .llbl{font-size:0.72rem;color:var(--green);font-weight:700;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  main{max-width:1200px;margin:0 auto;padding:16px 13px;}
  .loading{text-align:center;padding:60px 20px;color:var(--text-dim);}
  .sp{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-size:0.78rem;margin-top:6px;}
  .errbox{background:var(--surface);border:1px solid rgba(224,85,85,0.3);border-radius:var(--radius);padding:20px;text-align:center;margin:40px auto;max-width:380px;}
  .errbox p{font-size:0.8rem;color:var(--text-dim);margin-bottom:12px;line-height:1.5;}
  .btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:0.8rem;font-weight:600;transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#1a1408;}
  .fbar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .fbtn{padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.15s;text-transform:uppercase;}
  .fbtn.active{background:rgba(201,168,76,0.15);border-color:var(--gold);color:var(--gold);}
  #card-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
  .ci{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all 0.2s;position:relative;}
  .ci:hover{border-color:var(--gold);box-shadow:0 0 18px rgba(201,168,76,0.15);transform:translateY(-2px);}
  .ci.sel{border-color:var(--gold);box-shadow:0 0 22px rgba(201,168,76,0.3);}
  .ci.sold{opacity:0.45;pointer-events:none;}
  .ci.sold::after{content:'SOLD';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-20deg);font-size:2rem;font-weight:900;color:var(--red);opacity:0.85;letter-spacing:4px;border:3px solid var(--red);padding:4px 12px;border-radius:4px;pointer-events:none;}
  .schk{position:absolute;top:9px;right:9px;width:26px;height:26px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#1a1408;font-weight:900;font-size:0.95rem;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .cimg{position:relative;aspect-ratio:4/3;overflow:hidden;background:#0a0a15;}
  .cimg img{width:100%;height:100%;object-fit:contain;display:none;}
  .cimg img.active{display:block;}
  .cnav{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;}
  .cdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.15s;}
  .cdot.active{background:var(--gold);width:13px;border-radius:3px;}
  .cbtn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.6);border:none;color:white;width:23px;height:23px;border-radius:50%;cursor:pointer;font-size:0.78rem;display:flex;align-items:center;justify-content:center;z-index:2;}
  .cbtn.prev{left:6px;}.cbtn.next{right:6px;}
  .bbadge{position:absolute;top:7px;left:7px;background:linear-gradient(135deg,#7b3fa0,#5a2d80);color:white;font-size:0.62rem;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;z-index:3;}
  .ebadge{position:absolute;top:7px;left:7px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#1a1408;font-size:0.6rem;font-weight:900;padding:2px 6px;border-radius:4px;text-transform:uppercase;z-index:3;}
  .cbody{padding:10px;}
  .cname{font-size:0.9rem;font-weight:700;margin-bottom:1px;}
  .cnum{font-size:0.67rem;color:var(--text-dim);margin-bottom:4px;}
  .cset{font-size:0.72rem;color:var(--gold);font-weight:600;margin-bottom:5px;}
  .ctags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
  .tag{font-size:0.61rem;padding:2px 5px;border-radius:4px;font-weight:600;text-transform:uppercase;}
  .tr{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--gold-dim);}
  .th{background:rgba(79,163,214,0.12);color:var(--blue);border:1px solid rgba(79,163,214,0.3);}
  .cremark{font-size:0.7rem;color:var(--text-dim);line-height:1.4;margin-bottom:8px;}
  .pdisplay{font-size:1.15rem;font-weight:800;color:var(--gold-light);}
  .punset{font-size:0.8rem;color:var(--text-dim);font-style:italic;}
  #cart{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:2px solid var(--gold);z-index:150;transition:transform 0.3s ease;}
  #cart.col{transform:translateY(calc(100% - 56px));}
  .ctog{padding:13px 16px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;}
  .ccnt{background:var(--gold);color:#1a1408;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.78rem;font-weight:800;}
  .ctitle{font-weight:700;flex:1;font-size:0.9rem;}
  .ctotal{font-weight:800;color:var(--gold-light);font-size:1.05rem;}
  .cbdy{padding:0 16px 13px;max-height:48vh;overflow-y:auto;}
  .cempty{color:var(--text-dim);font-size:0.8rem;padding:12px 0;text-align:center;}
  .crow{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
  .crow img{width:44px;height:44px;object-fit:cover;border-radius:5px;}
  .cri{flex:1;}
  .crn{font-size:0.84rem;font-weight:600;}
  .crs{font-size:0.7rem;color:var(--text-dim);}
  .crp{font-weight:700;color:var(--gold-light);font-size:0.9rem;}
  .crm{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;padding:3px;}
  .crm:hover{color:var(--red);}
  .csum{padding:11px 0 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
  .gtlbl{font-size:0.78rem;color:var(--text-dim);}
  .gt{font-size:1.45rem;font-weight:800;color:var(--gold-light);}
  #toast{position:fixed;bottom:72px;right:14px;background:var(--surface);border:1px solid var(--gold);border-radius:8px;padding:9px 14px;font-size:0.78rem;font-weight:600;color:var(--gold-light);box-shadow:var(--shadow);z-index:300;transform:translateY(12px);opacity:0;transition:all 0.25s;pointer-events:none;max-width:250px;}
  #toast.show{transform:translateY(0);opacity:1;}
  @media(max-width:600px){#card-list{grid-template-columns:1fr 1fr;gap:9px;}.cbody{padding:8px;}.cname{font-size:0.8rem;}}
</style>
</head>
<body>
<header>
  <div><div class="logo">✦ PokéVault</div><div class="lsub">Zack's Vintage Collection · Singapore</div></div>
  <div class="lw"><div class="ldot"></div><div class="llbl">LIVE</div></div>
</header>
<main>
  <div id="loading" class="loading"><div class="sp"></div><div>Loading latest cards...</div><p id="lmsg"></p></div>
  <div id="errstate" style="display:none"><div class="errbox"><p id="errmsg">Could not load.</p><button class="btn btn-gold" onclick="init()">↺ Retry</button></div></div>
  <div id="content" style="display:none">
    <div class="fbar">
      <span style="font-size:0.72rem;color:var(--text-dim);font-weight:600;text-transform:uppercase;">Filter:</span>
      <button class="fbtn active" onclick="setF('all',this)">All</button>
      <button class="fbtn" onclick="setF('Base Set',this)">Base Set</button>
      <button class="fbtn" onclick="setF('Neo',this)">Neo</button>
      <button class="fbtn" onclick="setF('Team Rocket',this)">Rocket</button>
      <button class="fbtn" onclick="setF('EX',this)">EX Era</button>
      <button class="fbtn" onclick="setF('bundle',this)">Bundles</button>
    </div>
    <div id="card-list"></div>
  </div>
</main>
<div id="cart" class="col">
  <div class="ctog" onclick="toggleCart()">
    <div class="ccnt" id="ccnt">0</div>
    <div class="ctitle">🛒 My Cart</div>
    <div class="ctotal" id="ctotal">SGD 0.00</div>
    <span id="cchev">▲</span>
  </div>
  <div class="cbdy" id="cbdy"><div class="cempty">Tap any card to add it.</div></div>
</div>
<div id="toast"></div>
<script>
const GH_USER='zongting89',GH_REPO='pokevault';
let cards=[],selIds=new Set(),cartOpen=false,curF='all';

async function fetchRetry(url,tries=3){
  for(let i=0;i<tries;i++){
    try{
      document.getElementById('lmsg').textContent=i>0?`Retrying (${i+1}/3)...`:'Loading... (may take ~10s on first load)';
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(),45000);
      const r=await fetch(url,{signal:ctrl.signal});
      clearTimeout(t);
      if(!r.ok)throw new Error('HTTP '+r.status);
      return await r.json();
    }catch(e){
      if(i===tries-1)throw e;
      await new Promise(r=>setTimeout(r,3000));
    }
  }
}

async function init(){
  document.getElementById('loading').style.display='block';
  document.getElementById('errstate').style.display='none';
  document.getElementById('content').style.display='none';
  try{
    const url=`https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/main/data.json?t=${Date.now()}`;
    const d=await fetchRetry(url);
    cards=d.cards||[];
    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    render();
  }catch(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('errstate').style.display='block';
    document.getElementById('errmsg').textContent='Could not load cards: '+e.message+'. Check connection and retry.';
  }
}

function render(){
  const L=document.getElementById('card-list');L.innerHTML='';
  cards.filter(c=>{
    if(curF==='all')return true;
    if(curF==='bundle')return c.type==='bundle';
    return c.set&&c.set.toLowerCase().includes(curF.toLowerCase());
  }).forEach(c=>L.appendChild(mkCard(c)));
}

function mkCard(c){
  const d=document.createElement('div');
  d.className='ci'+(c.sold?' sold':'')+(selIds.has(c.id)?' sel':'');
  if(!c.sold)d.onclick=()=>togSel(c.id);
  const is1=c.remarks&&c.remarks.toLowerCase().includes('1st edition');
  const imgs=c.images||[];
  let car='';
  if(imgs.length>0){
    const it=imgs.map((s,i)=>`<img src="${s}" class="${i===0?'active':''}" loading="lazy" alt="${c.name}">`).join('');
    const dots=imgs.length>1?`<div class="cnav">${imgs.map((_,i)=>`<div class="cdot ${i===0?'active':''}" onclick="event.stopPropagation();cGo('${c.id}',${i})"></div>`).join('')}</div>`:'';
    const pv=imgs.length>1?`<button class="cbtn prev" onclick="event.stopPropagation();cSt('${c.id}',-1)">‹</button>`:'';
    const nx=imgs.length>1?`<button class="cbtn next" onclick="event.stopPropagation();cSt('${c.id}',1)">›</button>`:'';
    car=`<div class="cimg" id="ci-${c.id}">${pv}${it}${nx}${dots}</div>`;
  }
  const badge=c.type==='bundle'?'<div class="bbadge">📦 Bundle</div>':(is1?'<div class="ebadge">1st Ed</div>':'');
  const chk=selIds.has(c.id)?'<div class="schk">✓</div>':'';
  const ph=c.price?`<div class="pdisplay">SGD ${parseFloat(c.price).toFixed(2)}</div>`:`<div class="punset">Price on request</div>`;
  d.innerHTML=`${car}${badge}${chk}<div class="cbody"><div class="cname">${c.name}</div><div class="cnum">${c.number||''}</div><div class="cset">${c.set||''}</div><div class="ctags">${c.rarity?`<span class="tag tr">${c.rarity}</span>`:''}`+
    `${c.holo&&c.holo!=='None'?`<span class="tag th">✦ ${c.holo}</span>`:''}</div><div class="cremark">${c.remarks||''}</div><div>${ph}</div></div>`;
  return d;
}

function cGo(id,idx){const e=document.getElementById('ci-'+id);if(!e)return;e.querySelectorAll('img').forEach((i,n)=>i.classList.toggle('active',n===idx));e.querySelectorAll('.cdot').forEach((d,n)=>d.classList.toggle('active',n===idx));}
function cSt(id,dir){const e=document.getElementById('ci-'+id);if(!e)return;const imgs=e.querySelectorAll('img');let c=0;imgs.forEach((i,n)=>{if(i.classList.contains('active'))c=n;});cGo(id,(c+dir+imgs.length)%imgs.length);}

function togSel(id){
  const c=cards.find(c=>c.id===id);if(!c||c.sold)return;
  if(!c.price){showToast('No price listed');return;}
  selIds.has(id)?selIds.delete(id):selIds.add(id);
  render();renderCart();
}

function renderCart(){
  const n=selIds.size;document.getElementById('ccnt').textContent=n;
  const b=document.getElementById('cbdy');
  if(!n){b.innerHTML='<div class="cempty">Tap any card to add it.</div>';document.getElementById('ctotal').textContent='SGD 0.00';return;}
  let tot=0,html='';
  selIds.forEach(id=>{
    const c=cards.find(c=>c.id===id);if(!c)return;
    const p=parseFloat(c.price)||0;tot+=p;
    const img=c.images&&c.images[0]?c.images[0]:'';
    html+=`<div class="crow">${img?`<img src="${img}" alt="${c.name}">`:''}
      <div class="cri"><div class="crn">${c.name}</div><div class="crs">${c.set} · ${c.rarity}</div></div>
      <div class="crp">SGD ${p.toFixed(2)}</div>
      <button class="crm" onclick="togSel('${id}')">×</button></div>`;
  });
  html+=`<div class="csum"><div><div class="gtlbl">Grand Total (${n} item${n!==1?'s':''})</div><div class="gt">SGD ${tot.toFixed(2)}</div></div><button class="btn btn-gold" onclick="copyCart()">📋 Copy Summary</button></div>`;
  b.innerHTML=html;document.getElementById('ctotal').textContent='SGD '+tot.toFixed(2);
}

function copyCart(){
  let t='🃏 Pokémon Order — Zack's PokéVault\n══════════════════════════════\n',tot=0;
  selIds.forEach(id=>{const c=cards.find(c=>c.id===id);if(!c)return;const p=parseFloat(c.price)||0;tot+=p;t+=`• ${c.name} (${c.set} ${c.number}) — SGD ${p.toFixed(2)}\n`;});
  t+='══════════════════════════════\nTOTAL: SGD '+tot.toFixed(2);
  navigator.clipboard.writeText(t).then(()=>showToast('📋 Copied!'));
}

function toggleCart(){cartOpen=!cartOpen;document.getElementById('cart').classList.toggle('col',!cartOpen);document.getElementById('cchev').textContent=cartOpen?'▼':'▲';}
function setF(f,btn){curF=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

init();
</script>
</body>
</html>
